<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="flow-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d14"/>
      <stop offset="100%" style="stop-color:#0f1623"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3z" fill="#3b82f6"/>
    </marker>
    <filter id="gw"><feGaussianBlur stdDeviation="6" result="cb"/><feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="900" height="340" fill="url(#flow-bg)" rx="12"/>
  <rect width="900" height="340" fill="none" stroke="#1e2840" stroke-width="1" rx="12"/>
  <text x="450" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Query Execution Flow — How Data Reaches the Dashboard</text>
  <line x1="100" y1="40" x2="800" y2="40" stroke="#1e2840" stroke-width="1"/>

  <!-- Step 1: Raw Tables -->
  <rect x="30" y="64" width="150" height="196" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="30" y="64" width="150" height="28" rx="8" fill="#1e3a8a"/>
  <rect x="30" y="78" width="150" height="14" fill="#1e3a8a"/>
  <text x="105" y="82" text-anchor="middle" fill="white" font-size="11" font-weight="700">① Raw Tables</text>
  <text x="46" y="106" fill="#93c5fd" font-size="9.5">raw.orders</text>
  <text x="46" y="122" fill="#93c5fd" font-size="9.5">raw.order_items</text>
  <text x="46" y="138" fill="#93c5fd" font-size="9.5">raw.customers</text>
  <text x="46" y="154" fill="#93c5fd" font-size="9.5">raw.products</text>
  <text x="46" y="170" fill="#93c5fd" font-size="9.5">raw.campaigns</text>
  <line x1="30" y1="182" x2="180" y2="182" stroke="#1e2840" stroke-width="0.5"/>
  <text x="46" y="198" fill="#475569" font-size="9">Indexes:</text>
  <text x="46" y="212" fill="#475569" font-size="9">• idx_orders_date DESC</text>
  <text x="46" y="226" fill="#475569" font-size="9">• idx_orders_active (partial)</text>
  <text x="46" y="240" fill="#475569" font-size="9">• 6 more covering indexes</text>

  <!-- Step 2: Views -->
  <rect x="230" y="64" width="150" height="196" rx="8" fill="#0f172a" stroke="#065f46" stroke-width="1.5"/>
  <rect x="230" y="64" width="150" height="28" rx="8" fill="#065f46"/>
  <rect x="230" y="78" width="150" height="14" fill="#065f46"/>
  <text x="305" y="82" text-anchor="middle" fill="white" font-size="11" font-weight="700">② Mart Views</text>
  <text x="246" y="106" fill="#6ee7b7" font-size="9.5">v_daily_revenue</text>
  <text x="246" y="122" fill="#6ee7b7" font-size="9.5">v_product_performance</text>
  <text x="246" y="138" fill="#6ee7b7" font-size="9.5">v_customer_ltv</text>
  <text x="246" y="154" fill="#6ee7b7" font-size="9.5">v_campaign_roi</text>
  <text x="246" y="170" fill="#6ee7b7" font-size="9.5">v_channel_mix</text>
  <line x1="230" y1="182" x2="380" y2="182" stroke="#1e2840" stroke-width="0.5"/>
  <text x="246" y="198" fill="#475569" font-size="9">Optimisations:</text>
  <text x="246" y="212" fill="#475569" font-size="9">• Pre-joined with COALESCE</text>
  <text x="246" y="226" fill="#475569" font-size="9">• Filtered on active status</text>
  <text x="246" y="240" fill="#475569" font-size="9">• Rounded aggregates</text>

  <!-- Step 3: Mat View -->
  <rect x="430" y="64" width="150" height="196" rx="8" fill="#0f172a" stroke="#5b21b6" stroke-width="1.5"/>
  <rect x="430" y="64" width="150" height="28" rx="8" fill="#5b21b6"/>
  <rect x="430" y="78" width="150" height="14" fill="#5b21b6"/>
  <text x="505" y="82" text-anchor="middle" fill="white" font-size="11" font-weight="700">③ Materialised</text>
  <text x="446" y="106" fill="#c4b5fd" font-size="9.5">mv_monthly_kpis</text>
  <line x1="430" y1="116" x2="580" y2="116" stroke="#1e2840" stroke-width="0.5"/>
  <text x="446" y="132" fill="#475569" font-size="9">Pre-aggregated:</text>
  <text x="446" y="148" fill="#8b5cf6" font-size="9.5">• month (unique index)</text>
  <text x="446" y="164" fill="#8b5cf6" font-size="9.5">• orders, customers</text>
  <text x="446" y="180" fill="#8b5cf6" font-size="9.5">• revenue, profit</text>
  <text x="446" y="196" fill="#8b5cf6" font-size="9.5">• margin_pct</text>
  <line x1="430" y1="206" x2="580" y2="206" stroke="#1e2840" stroke-width="0.5"/>
  <text x="446" y="222" fill="#475569" font-size="9">REFRESH CONCURRENTLY</text>
  <text x="446" y="238" fill="#475569" font-size="9">every hour via pg_cron</text>

  <!-- Step 4: Stored Function -->
  <rect x="630" y="64" width="150" height="196" rx="8" fill="#0f172a" stroke="#164e63" stroke-width="1.5"/>
  <rect x="630" y="64" width="150" height="28" rx="8" fill="#164e63"/>
  <rect x="630" y="78" width="150" height="14" fill="#164e63"/>
  <text x="705" y="82" text-anchor="middle" fill="white" font-size="11" font-weight="700">④ API Functions</text>
  <text x="646" y="106" fill="#67e8f9" font-size="9.5">api.get_kpi_summary()</text>
  <text x="646" y="122" fill="#67e8f9" font-size="9.5">api.get_top_products()</text>
  <text x="646" y="138" fill="#67e8f9" font-size="9.5">api.refresh_marts()</text>
  <line x1="630" y1="150" x2="780" y2="150" stroke="#1e2840" stroke-width="0.5"/>
  <text x="646" y="166" fill="#475569" font-size="9">FastAPI calls:</text>
  <text x="646" y="182" fill="#06b6d4" font-size="9.5">• SELECT * FROM</text>
  <text x="646" y="196" fill="#06b6d4" font-size="9.5">  api.get_kpi_summary($1)</text>
  <text x="646" y="214" fill="#475569" font-size="9">Parameterised queries</text>
  <text x="646" y="230" fill="#475569" font-size="9">prevent SQL injection</text>
  <text x="646" y="246" fill="#475569" font-size="9">asyncpg handles pooling</text>

  <!-- Arrows between steps -->
  <line x1="182" y1="162" x2="228" y2="162" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="382" y1="162" x2="428" y2="162" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="582" y1="162" x2="628" y2="162" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Labels on arrows -->
  <text x="205" y="155" text-anchor="middle" fill="#3b82f6" font-size="9">JOIN +</text>
  <text x="205" y="167" text-anchor="middle" fill="#3b82f6" font-size="9">GROUP</text>
  <text x="405" y="155" text-anchor="middle" fill="#3b82f6" font-size="9">cache</text>
  <text x="405" y="167" text-anchor="middle" fill="#3b82f6" font-size="9">agg</text>
  <text x="605" y="155" text-anchor="middle" fill="#3b82f6" font-size="9">CALL</text>
  <text x="605" y="167" text-anchor="middle" fill="#3b82f6" font-size="9">func</text>

  <!-- Explain Analyze annotation -->
  <rect x="30" y="282" width="840" height="46" rx="6" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="46" y="299" fill="#fbbf24" font-size="11" font-weight="700">🔍  POST /api/v1/explain</text>
  <text x="200" y="299" fill="#94a3b8" font-size="10">→  Runs  EXPLAIN (ANALYZE, BUFFERS, FORMAT JSON)  on any SELECT  →  returns full query plan as JSON  →  identify seq scans, missing indexes, slow joins</text>
  <text x="46" y="318" fill="#475569" font-size="9" font-style="italic">Security: only SELECT statements permitted · rolled-back transaction ensures EXPLAIN ANALYZE never mutates data</text>
</svg>
