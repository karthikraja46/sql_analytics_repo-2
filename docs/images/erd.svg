<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d14"/>
      <stop offset="100%" style="stop-color:#0f1623"/>
    </linearGradient>
    <filter id="s2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="960" height="580" fill="url(#bg2)" rx="12"/>
  <rect width="960" height="580" fill="none" stroke="#1e2840" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700" letter-spacing="0.5">Entity Relationship Diagram — raw schema (3NF)</text>
  <line x1="160" y1="44" x2="800" y2="44" stroke="#1e2840" stroke-width="1"/>

  <!-- ══ TABLE MACRO: name, x, y, w, h, header-color, rows[] ══ -->

  <!-- regions -->
  <g filter="url(#s2)">
    <rect x="30" y="60" width="160" height="114" rx="7" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
    <rect x="30" y="60" width="160" height="28" rx="7" fill="#1e3a8a"/>
    <rect x="30" y="74" width="160" height="14" rx="0" fill="#1e3a8a"/>
    <text x="110" y="79" text-anchor="middle" fill="white" font-size="11" font-weight="700">regions</text>
    <line x1="30" y1="88" x2="190" y2="88" stroke="#1e2840" stroke-width="1"/>
    <text x="44" y="104" fill="#fbbf24" font-size="10" font-weight="600">🔑 region_id   SERIAL PK</text>
    <text x="44" y="120" fill="#93c5fd" font-size="10">   region_name VARCHAR(100)</text>
    <text x="44" y="136" fill="#93c5fd" font-size="10">   country     VARCHAR(100)</text>
    <text x="44" y="160" fill="#475569" font-size="9" font-style="italic">8 rows · India regions</text>
  </g>

  <!-- customers -->
  <g filter="url(#s2)">
    <rect x="240" y="60" width="196" height="162" rx="7" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
    <rect x="240" y="60" width="196" height="28" rx="7" fill="#1e3a8a"/>
    <rect x="240" y="74" width="196" height="14" rx="0" fill="#1e3a8a"/>
    <text x="338" y="79" text-anchor="middle" fill="white" font-size="11" font-weight="700">customers</text>
    <line x1="240" y1="88" x2="436" y2="88" stroke="#1e2840" stroke-width="1"/>
    <text x="254" y="104" fill="#fbbf24" font-size="10" font-weight="600">🔑 customer_id  UUID PK</text>
    <text x="254" y="120" fill="#93c5fd" font-size="10">   full_name    VARCHAR(200)</text>
    <text x="254" y="136" fill="#93c5fd" font-size="10">   email        VARCHAR(254) UNIQUE</text>
    <text x="254" y="152" fill="#f9a8d4" font-size="10">🔗 region_id    INT FK</text>
    <text x="254" y="168" fill="#93c5fd" font-size="10">   signup_date  DATE</text>
    <text x="254" y="184" fill="#93c5fd" font-size="10">   customer_tier VARCHAR(20)</text>
    <text x="254" y="208" fill="#475569" font-size="9" font-style="italic">500 rows · tier: std/silver/gold/plat</text>
  </g>

  <!-- orders -->
  <g filter="url(#s2)">
    <rect x="240" y="258" width="196" height="178" rx="7" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
    <rect x="240" y="258" width="196" height="28" rx="7" fill="#164e63"/>
    <rect x="240" y="272" width="196" height="14" rx="0" fill="#164e63"/>
    <text x="338" y="277" text-anchor="middle" fill="white" font-size="11" font-weight="700">orders</text>
    <line x1="240" y1="286" x2="436" y2="286" stroke="#1e2840" stroke-width="1"/>
    <text x="254" y="302" fill="#fbbf24" font-size="10" font-weight="600">🔑 order_id     UUID PK</text>
    <text x="254" y="318" fill="#f9a8d4" font-size="10">🔗 customer_id  UUID FK</text>
    <text x="254" y="334" fill="#93c5fd" font-size="10">   order_date   TIMESTAMPTZ</text>
    <text x="254" y="350" fill="#93c5fd" font-size="10">   status       VARCHAR(20)</text>
    <text x="254" y="366" fill="#93c5fd" font-size="10">   channel      VARCHAR(30)</text>
    <text x="254" y="382" fill="#93c5fd" font-size="10">   discount_pct NUMERIC(5,2)</text>
    <text x="254" y="418" fill="#475569" font-size="9" font-style="italic">3 000 rows · 6 statuses · 4 channels</text>
  </g>

  <!-- order_items -->
  <g filter="url(#s2)">
    <rect x="490" y="258" width="196" height="162" rx="7" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
    <rect x="490" y="258" width="196" height="28" rx="7" fill="#164e63"/>
    <rect x="490" y="272" width="196" height="14" rx="0" fill="#164e63"/>
    <text x="588" y="277" text-anchor="middle" fill="white" font-size="11" font-weight="700">order_items</text>
    <line x1="490" y1="286" x2="686" y2="286" stroke="#1e2840" stroke-width="1"/>
    <text x="504" y="302" fill="#fbbf24" font-size="10" font-weight="600">🔑 item_id    SERIAL PK</text>
    <text x="504" y="318" fill="#f9a8d4" font-size="10">🔗 order_id   UUID FK</text>
    <text x="504" y="334" fill="#f9a8d4" font-size="10">🔗 product_id INT FK</text>
    <text x="504" y="350" fill="#93c5fd" font-size="10">   quantity   INT</text>
    <text x="504" y="366" fill="#fde68a" font-size="10" font-style="italic">   unit_price ← snapshot!</text>
    <text x="504" y="382" fill="#fde68a" font-size="10" font-style="italic">   cost_price ← snapshot!</text>
    <text x="504" y="406" fill="#475569" font-size="9" font-style="italic">~8 500 rows · immutable pricing</text>
  </g>

  <!-- products -->
  <g filter="url(#s2)">
    <rect x="490" y="60" width="196" height="178" rx="7" fill="#0f172a" stroke="#065f46" stroke-width="1.5"/>
    <rect x="490" y="60" width="196" height="28" rx="7" fill="#065f46"/>
    <rect x="490" y="74" width="196" height="14" rx="0" fill="#065f46"/>
    <text x="588" y="79" text-anchor="middle" fill="white" font-size="11" font-weight="700">products</text>
    <line x1="490" y1="88" x2="686" y2="88" stroke="#1e2840" stroke-width="1"/>
    <text x="504" y="104" fill="#fbbf24" font-size="10" font-weight="600">🔑 product_id  SERIAL PK</text>
    <text x="504" y="120" fill="#6ee7b7" font-size="10">   sku         VARCHAR(50) UNIQUE</text>
    <text x="504" y="136" fill="#6ee7b7" font-size="10">   product_name VARCHAR(255)</text>
    <text x="504" y="152" fill="#f9a8d4" font-size="10">🔗 category_id INT FK</text>
    <text x="504" y="168" fill="#6ee7b7" font-size="10">   unit_price  NUMERIC(12,2)</text>
    <text x="504" y="184" fill="#6ee7b7" font-size="10">   cost_price  NUMERIC(12,2)</text>
    <text x="504" y="200" fill="#6ee7b7" font-size="10">   is_active   BOOLEAN</text>
    <text x="504" y="222" fill="#475569" font-size="9" font-style="italic">26 rows · 5 categories</text>
  </g>

  <!-- categories -->
  <g filter="url(#s2)">
    <rect x="740" y="60" width="196" height="114" rx="7" fill="#0f172a" stroke="#065f46" stroke-width="1.5"/>
    <rect x="740" y="60" width="196" height="28" rx="7" fill="#065f46"/>
    <rect x="740" y="74" width="196" height="14" rx="0" fill="#065f46"/>
    <text x="838" y="79" text-anchor="middle" fill="white" font-size="11" font-weight="700">categories</text>
    <line x1="740" y1="88" x2="936" y2="88" stroke="#1e2840" stroke-width="1"/>
    <text x="754" y="104" fill="#fbbf24" font-size="10" font-weight="600">🔑 category_id   SERIAL PK</text>
    <text x="754" y="120" fill="#6ee7b7" font-size="10">   category_name VARCHAR(100)</text>
    <text x="754" y="136" fill="#f9a8d4" font-size="10">🔗 parent_id     INT self-FK</text>
    <text x="754" y="160" fill="#475569" font-size="9" font-style="italic">Self-ref for sub-categories</text>
  </g>

  <!-- campaigns -->
  <g filter="url(#s2)">
    <rect x="740" y="258" width="196" height="162" rx="7" fill="#0f172a" stroke="#78350f" stroke-width="1.5"/>
    <rect x="740" y="258" width="196" height="28" rx="7" fill="#78350f"/>
    <rect x="740" y="272" width="196" height="14" rx="0" fill="#78350f"/>
    <text x="838" y="277" text-anchor="middle" fill="white" font-size="11" font-weight="700">campaigns</text>
    <line x1="740" y1="286" x2="936" y2="286" stroke="#1e2840" stroke-width="1"/>
    <text x="754" y="302" fill="#fbbf24" font-size="10" font-weight="600">🔑 campaign_id   SERIAL PK</text>
    <text x="754" y="318" fill="#fde68a" font-size="10">   campaign_name VARCHAR(200)</text>
    <text x="754" y="334" fill="#fde68a" font-size="10">   channel       VARCHAR(50)</text>
    <text x="754" y="350" fill="#fde68a" font-size="10">   start_date    DATE</text>
    <text x="754" y="366" fill="#fde68a" font-size="10">   budget        NUMERIC(14,2)</text>
    <text x="754" y="382" fill="#fde68a" font-size="10">   spend         NUMERIC(14,2)</text>
    <text x="754" y="406" fill="#475569" font-size="9" font-style="italic">15 rows · 5 channels</text>
  </g>

  <!-- order_attribution (bridge) -->
  <g filter="url(#s2)">
    <rect x="490" y="460" width="196" height="88" rx="7" fill="#0f172a" stroke="#5b21b6" stroke-width="1.5"/>
    <rect x="490" y="460" width="196" height="28" rx="7" fill="#5b21b6"/>
    <rect x="490" y="474" width="196" height="14" rx="0" fill="#5b21b6"/>
    <text x="588" y="479" text-anchor="middle" fill="white" font-size="11" font-weight="700">order_attribution</text>
    <line x1="490" y1="488" x2="686" y2="488" stroke="#1e2840" stroke-width="1"/>
    <text x="504" y="504" fill="#f9a8d4" font-size="10">🔗 order_id    UUID FK  (PK)</text>
    <text x="504" y="520" fill="#f9a8d4" font-size="10">🔗 campaign_id INT FK  (PK)</text>
    <text x="504" y="536" fill="#475569" font-size="9" font-style="italic">Many-to-many bridge table</text>
  </g>

  <!-- ══ RELATIONSHIPS ══ -->
  <!-- regions → customers -->
  <line x1="190" y1="120" x2="240" y2="168" stroke="#f9a8d4" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="198" y="145" fill="#f9a8d4" font-size="8">1:N</text>

  <!-- customers → orders -->
  <line x1="338" y1="222" x2="338" y2="258" stroke="#f9a8d4" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"/>
  <text x="344" y="244" fill="#f9a8d4" font-size="8">1:N</text>

  <!-- orders → order_items -->
  <line x1="436" y1="320" x2="490" y2="320" stroke="#f9a8d4" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"/>
  <text x="453" y="314" fill="#f9a8d4" font-size="8">1:N</text>

  <!-- products → order_items -->
  <line x1="588" y1="238" x2="588" y2="258" stroke="#f9a8d4" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"/>
  <text x="594" y="252" fill="#f9a8d4" font-size="8">1:N</text>

  <!-- categories → products -->
  <line x1="740" y1="116" x2="686" y2="116" stroke="#f9a8d4" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="700" y="110" fill="#f9a8d4" font-size="8">1:N</text>

  <!-- orders → order_attribution -->
  <line x1="338" y1="436" x2="490" y2="490" stroke="#c4b5fd" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- campaigns → order_attribution -->
  <line x1="838" y1="420" x2="686" y2="494" stroke="#c4b5fd" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="760" y="463" fill="#c4b5fd" font-size="8">N:N bridge</text>

  <!-- ── Key legend ── -->
  <rect x="30" y="490" width="446" height="74" rx="6" fill="#0a0d14" stroke="#1e2840" stroke-width="1"/>
  <text x="46" y="508" fill="#64748b" font-size="9" font-weight="700">LEGEND</text>
  <rect x="94" y="498" width="10" height="10" rx="2" fill="#1e3a8a"/>
  <text x="108" y="508" fill="#94a3b8" font-size="9">Order/Customer tables</text>
  <rect x="232" y="498" width="10" height="10" rx="2" fill="#065f46"/>
  <text x="246" y="508" fill="#94a3b8" font-size="9">Product/Category tables</text>
  <rect x="376" y="498" width="10" height="10" rx="2" fill="#78350f"/>
  <text x="390" y="508" fill="#94a3b8" font-size="9">Campaign tables</text>
  <text x="46" y="526" fill="#fbbf24" font-size="9">🔑 PK</text>
  <text x="82" y="526" fill="#f9a8d4" font-size="9">🔗 FK</text>
  <text x="116" y="526" fill="#fde68a" font-size="9">italic = snapshot column (immutable)</text>
  <line x1="46" y1="538" x2="70" y2="538" stroke="#f9a8d4" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.8"/>
  <text x="74" y="542" fill="#94a3b8" font-size="9">FK relationship</text>
  <text x="46" y="556" fill="#475569" font-size="9" font-style="italic">Normalised to 3NF · order_items snapshots unit_price + cost_price at purchase time → immutable historical revenue</text>
</svg>
