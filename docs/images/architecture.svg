<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d14"/>
      <stop offset="100%" style="stop-color:#111520"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#164e63"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>
  <rect width="900" height="520" fill="none" stroke="#1e2840" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700" letter-spacing="0.5">SQL-Driven Analytics Dashboard — Architecture</text>
  <line x1="200" y1="46" x2="700" y2="46" stroke="#1e2840" stroke-width="1"/>

  <!-- ── PostgreSQL Block ── -->
  <rect x="40" y="68" width="260" height="380" rx="10" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="68" width="260" height="36" rx="10" fill="url(#blueGrad)"/>
  <rect x="40" y="90" width="260" height="14" rx="0" fill="url(#blueGrad)"/>
  <text x="170" y="91" text-anchor="middle" fill="white" font-size="12" font-weight="700">🐘  PostgreSQL 16</text>

  <!-- raw schema -->
  <rect x="58" y="116" width="224" height="96" rx="7" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="170" y="133" text-anchor="middle" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1">SCHEMA: raw</text>
  <text x="72" y="151" fill="#93c5fd" font-size="10">▸ orders, order_items</text>
  <text x="72" y="167" fill="#93c5fd" font-size="10">▸ customers, regions</text>
  <text x="72" y="183" fill="#93c5fd" font-size="10">▸ products, categories</text>
  <text x="72" y="199" fill="#93c5fd" font-size="10">▸ campaigns, attribution</text>

  <!-- mart schema -->
  <rect x="58" y="222" width="224" height="112" rx="7" fill="#111827" stroke="#065f46" stroke-width="1"/>
  <text x="170" y="239" text-anchor="middle" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1">SCHEMA: mart</text>
  <text x="72" y="257" fill="#6ee7b7" font-size="10">▸ v_daily_revenue</text>
  <text x="72" y="273" fill="#6ee7b7" font-size="10">▸ v_product_performance</text>
  <text x="72" y="289" fill="#6ee7b7" font-size="10">▸ v_customer_ltv</text>
  <text x="72" y="305" fill="#6ee7b7" font-size="10">▸ v_campaign_roi</text>
  <text x="72" y="321" fill="#34d399" font-size="10" font-weight="600">▸ mv_monthly_kpis ⚡ matview</text>

  <!-- api schema -->
  <rect x="58" y="344" width="224" height="90" rx="7" fill="#111827" stroke="#5b21b6" stroke-width="1"/>
  <text x="170" y="361" text-anchor="middle" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1">SCHEMA: api</text>
  <text x="72" y="379" fill="#c4b5fd" font-size="10">▸ get_kpi_summary(days)</text>
  <text x="72" y="395" fill="#c4b5fd" font-size="10">▸ get_top_products(n, days)</text>
  <text x="72" y="411" fill="#c4b5fd" font-size="10">▸ refresh_marts() procedure</text>

  <!-- ── FastAPI Block ── -->
  <rect x="340" y="148" width="220" height="240" rx="10" fill="#0f172a" stroke="#164e63" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="340" y="148" width="220" height="36" rx="10" fill="url(#cyanGrad)"/>
  <rect x="340" y="170" width="220" height="14" rx="0" fill="url(#cyanGrad)"/>
  <text x="450" y="172" text-anchor="middle" fill="white" font-size="12" font-weight="700">⚡  FastAPI  :8000</text>

  <text x="354" y="198" fill="#67e8f9" font-size="9.5">GET  /api/v1/kpis</text>
  <text x="354" y="214" fill="#67e8f9" font-size="9.5">GET  /api/v1/revenue/daily</text>
  <text x="354" y="230" fill="#67e8f9" font-size="9.5">GET  /api/v1/revenue/monthly</text>
  <text x="354" y="246" fill="#67e8f9" font-size="9.5">GET  /api/v1/products/top</text>
  <text x="354" y="262" fill="#67e8f9" font-size="9.5">GET  /api/v1/customers/ltv</text>
  <text x="354" y="278" fill="#67e8f9" font-size="9.5">GET  /api/v1/campaigns/roi</text>
  <text x="354" y="294" fill="#67e8f9" font-size="9.5">GET  /api/v1/channels</text>
  <text x="354" y="310" fill="#fde68a" font-size="9.5">POST /api/v1/explain  ← EXPLAIN</text>
  <text x="354" y="326" fill="#fde68a" font-size="9.5">POST /api/v1/admin/refresh</text>
  <text x="354" y="348" fill="#475569" font-size="9" font-style="italic">asyncpg pool · Pydantic v2</text>
  <text x="354" y="362" fill="#475569" font-size="9" font-style="italic">CORS middleware · lifespan</text>

  <!-- ── Dashboard Block ── -->
  <rect x="620" y="68" width="240" height="152" rx="10" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="620" y="68" width="240" height="36" rx="10" fill="url(#blueGrad)"/>
  <rect x="620" y="90" width="240" height="14" rx="0" fill="url(#blueGrad)"/>
  <text x="740" y="91" text-anchor="middle" fill="white" font-size="12" font-weight="700">🌐  Web Dashboard</text>
  <text x="634" y="118" fill="#93c5fd" font-size="10">▸ Overview — KPI cards + charts</text>
  <text x="634" y="134" fill="#93c5fd" font-size="10">▸ Products — bar + category pie</text>
  <text x="634" y="150" fill="#93c5fd" font-size="10">▸ Customers — LTV segmentation</text>
  <text x="634" y="166" fill="#93c5fd" font-size="10">▸ Campaigns — ROI + ROAS</text>
  <text x="634" y="182" fill="#475569" font-size="9" font-style="italic">Chart.js 4 · dark theme · mock fallback</text>
  <text x="634" y="196" fill="#475569" font-size="9" font-style="italic">Single HTML file · no build step</text>

  <!-- ── Power BI Block ── -->
  <rect x="620" y="240" width="240" height="136" rx="10" fill="#0f172a" stroke="#92400e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="620" y="240" width="240" height="36" rx="10" fill="url(#amberGrad)"/>
  <rect x="620" y="262" width="240" height="14" rx="0" fill="url(#amberGrad)"/>
  <text x="740" y="263" text-anchor="middle" fill="white" font-size="12" font-weight="700">📊  Power BI Desktop</text>
  <text x="634" y="290" fill="#fde68a" font-size="10">▸ DirectQuery connection</text>
  <text x="634" y="306" fill="#fde68a" font-size="10">▸ 20+ DAX measures</text>
  <text x="634" y="322" fill="#fde68a" font-size="10">▸ MoM%, YTD, YoY, LTV, ROAS</text>
  <text x="634" y="338" fill="#fde68a" font-size="10">▸ Retention Rate, Avg Order Value</text>
  <text x="634" y="358" fill="#475569" font-size="9" font-style="italic">4 report pages · scheduled refresh</text>

  <!-- ── Seed / Scripts Block ── -->
  <rect x="620" y="396" width="240" height="88" rx="10" fill="#0f172a" stroke="#065f46" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="620" y="396" width="240" height="32" rx="10" fill="url(#greenGrad)"/>
  <rect x="620" y="414" width="240" height="14" rx="0" fill="url(#greenGrad)"/>
  <text x="740" y="417" text-anchor="middle" fill="white" font-size="12" font-weight="700">🌱  Scripts / Tests</text>
  <text x="634" y="443" fill="#6ee7b7" font-size="10">▸ seed_data.py — Faker en_IN</text>
  <text x="634" y="459" fill="#6ee7b7" font-size="10">▸ 500 customers · 3k orders</text>
  <text x="634" y="475" fill="#6ee7b7" font-size="10">▸ pytest (15 async tests)</text>

  <!-- ── Arrows ── -->
  <!-- DB → FastAPI -->
  <line x1="300" y1="268" x2="338" y2="268" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="318" y="261" text-anchor="middle" fill="#3b82f6" font-size="8">asyncpg</text>

  <!-- FastAPI → Dashboard -->
  <line x1="560" y1="196" x2="618" y2="148" stroke="#06b6d4" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowCyan)"/>
  <text x="596" y="167" fill="#06b6d4" font-size="8">HTTP</text>

  <!-- FastAPI → Power BI -->
  <line x1="560" y1="260" x2="618" y2="290" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowAmber)"/>
  <text x="596" y="270" fill="#f59e0b" font-size="8">SQL</text>

  <!-- DB → Power BI (direct) -->
  <line x1="300" y1="360" x2="618" y2="340" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrowAmber)" opacity="0.5"/>

  <!-- Seed → DB -->
  <line x1="620" y1="430" x2="302" y2="390" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="456" y="415" fill="#10b981" font-size="8">seed</text>

  <!-- Legend -->
  <rect x="40" y="462" width="560" height="44" rx="6" fill="#0a0d14" stroke="#1e2840" stroke-width="1"/>
  <text x="56" y="479" fill="#475569" font-size="9" font-weight="700">LEGEND</text>
  <line x1="104" y1="476" x2="134" y2="476" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="138" y="479" fill="#94a3b8" font-size="9">asyncpg / SQL</text>
  <line x1="214" y1="476" x2="244" y2="476" stroke="#06b6d4" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="248" y="479" fill="#94a3b8" font-size="9">HTTP/REST</text>
  <line x1="314" y1="476" x2="344" y2="476" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="348" y="479" fill="#94a3b8" font-size="9">DirectQuery</text>
  <line x1="424" y1="476" x2="454" y2="476" stroke="#10b981" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="458" y="479" fill="#94a3b8" font-size="9">Data seed</text>

  <text x="56" y="497" fill="#475569" font-size="9" font-weight="700">STACK</text>
  <text x="104" y="497" fill="#94a3b8" font-size="9">PostgreSQL 16 · FastAPI 0.111 · asyncpg · Pydantic v2 · Chart.js 4 · Power BI Desktop · pytest</text>
</svg>
